<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISChaos - {% block title %}{{ page_title | default('首页') }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen flex">

    <!-- 侧边导航 -->
    <aside class="w-56 bg-white border-r border-gray-200 min-h-screen flex flex-col">
        <div class="px-5 py-4 border-b border-gray-200">
            <h1 class="text-lg font-bold text-blue-600">ISChaos</h1>
            <p class="text-xs text-gray-400 mt-0.5">混沌工程演练平台</p>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
            <a href="/" class="nav-item {% if page_title == '首页' %}active{% endif %}">
                <span class="nav-icon">&#9632;</span> 平台概览
            </a>
            <a href="/interfaces" class="nav-item {% if page_title == '接口列表' %}active{% endif %}">
                <span class="nav-icon">&#9670;</span> 接口列表
            </a>
            <a href="/plans" class="nav-item {% if page_title == '演练计划' %}active{% endif %}">
                <span class="nav-icon">&#9654;</span> 演练计划
            </a>
        </nav>
        <div class="px-5 py-3 border-t border-gray-200 text-xs text-gray-400">
            v0.1.0
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col">
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
            <h2 class="text-base font-semibold text-gray-700">{{ page_title | default('首页') }}</h2>
        </header>
        <div class="flex-1 p-6">
            {% block content %}
            <div class="text-center text-gray-400 mt-20">
                <p class="text-4xl mb-4">&#9881;</p>
                <p class="text-lg">欢迎使用 ISChaos 混沌工程演练平台</p>
                <p class="text-sm mt-2">从左侧导航开始操作</p>
            </div>
            {% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
